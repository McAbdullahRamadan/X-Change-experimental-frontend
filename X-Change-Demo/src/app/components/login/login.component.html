<section class="auth-section-log">
  <div class="auth-card">
    <h2>Welcome Back 👋</h2>
    <p class="subtitle">Log in to continue your journey</p>
    <button class="back-btn" routerLink="/"><i class="bi bi-box-arrow-in-left"></i>
       Back to Home
    </button>

    <form [formGroup]="loginForm" (ngSubmit)="submit()">
      <div class="input-group">
        <label>Email</label>
        <input
          formControlName="email"
          autofocus
          type="email"
          placeholder="you@example.com"
          [class.is-invalid]="isFieldInvalid('email')"
        >
        <div class="error-message" *ngIf="isFieldInvalid('email')">
          {{ getErrorMessage('email') }}
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="type"
            formControlName="password"
            placeholder="••••••••"
            [class.is-invalid]="isFieldInvalid('password')"
          >
          <span class="spanpass" (click)="hideShowPass()" [class]="'bi ' + eyeIcone"></span>
        </div>
        <div class="error-message" *ngIf="isFieldInvalid('password')">
          {{ getErrorMessage('password') }}
        </div>
        <div class="forgot-password-link">
          <a routerLink="/forgot-password">Forgot password?</a>
        </div>
      </div>

      <button type="submit" class="primary-btn full">
        Log In
      </button>
    </form>

    <p class="switch">
      Don't have an account?
      <a routerLink="/register">Create one</a>
    </p>

    <div class="divider-line">
      <span>OR</span>
    </div>

    <div class="social-login">
      <button class="social-btn google">
        <i class="bi bi-google"></i>
        Continue with Google
      </button>

      <button class="social-btn linkedin">
        <i class="bi bi-linkedin"></i>
        Continue with LinkedIn
      </button>

      <button class="social-btn github">
        <i class="bi bi-github"></i>
        Continue with GitHub
      </button>
    </div>
  </div>
</section>
