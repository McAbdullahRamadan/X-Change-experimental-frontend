<section class="auth-section-forget">
  <div class="auth-card forgot-card">
    <h2>Forgot Password? 🔐</h2>
    <p class="subtitle" *ngIf="!isEmailSent">No worries! Enter your email and we'll send you a reset code.</p>
    <p class="subtitle success-text" *ngIf="isEmailSent">✅ Check your email! We've sent you a reset code.</p>

    <button class="back-btn" routerLink="/login">
      <i class="bi bi-arrow-left"></i> Back to Login
    </button>

    <!-- الفورم (يظهر لو لسه البريد متبعتهوش) -->
    <form [formGroup]="forgotForm" (ngSubmit)="submit()" *ngIf="!isEmailSent">
      <div class="input-group">
        <label>Email Address</label>
        <input
          formControlName="email"
          type="email"
          placeholder="Enter your email"
          [class.is-invalid]="isFieldInvalid('email')"
          [disabled]="isLoading"
        >
        <div class="error-message" *ngIf="isFieldInvalid('email')">
          {{ getErrorMessage('email') }}
        </div>
      </div>

      <button type="submit" class="primary-btn full" [disabled]="isLoading">
        <span *ngIf="!isLoading">
          <i class="bi bi-send"></i> Send Reset Code
        </span>
        <span *ngIf="isLoading">
          <i class="bi bi-arrow-repeat spinning"></i> Sending...
        </span>
      </button>
    </form>

    <!-- رسالة بعد الإرسال -->
    <div class="after-send" *ngIf="isEmailSent">
      <div class="email-icon">
        <i class="bi bi-envelope-check-fill"></i>
      </div>
      <p class="instruction">
        We've sent a reset code to <strong>{{ forgotForm.get('email')?.value }}</strong>
      </p>

    </div>
  </div>
</section>
