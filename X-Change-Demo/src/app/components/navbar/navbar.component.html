<nav class="navbar">
  <div class="logo">
    <img src="logo.png" alt="Logo" routerLink="/">

    <!-- زر تغيير الثيم -->
    <div class="theme-toggle-btn" (click)="toggleTheme()">
      <i class="bi" [ngClass]="isDark ? 'bi-moon-fill' : 'bi-sun-fill'"></i>
      <span>{{ isDark ? 'Dark' : 'Light' }}</span>
    </div>
  </div>

  <ul class="menu">
    <li routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <i class="bi bi-house-fill"></i> Home
    </li>
    <li  routerLink="/courses"><i class="bi bi-layers-fill"></i> Explore Skills</li>
    <li routerLink="/usercommunity"><i class="bi bi-people-fill"></i> Community</li>
    <li routerLink="/about" routerLinkActive="active">
      <i class="bi bi-info-circle"></i> About Us
    </li>

  </ul>

  <div class="actions">

    <ng-container *ngIf="!isLoggedIn">
      <button class="login" routerLink="/login">
        <i class="bi bi-person"></i> <span>Log In</span>
      </button>
      <button class="login" routerLink="/register">
        <i class="bi bi-file-text-fill"></i> <span>Register</span>
      </button>
    </ng-container>

    <div *ngIf="isLoggedIn" class="profile-container">
      <div class="profile-trigger" (click)="toggleProfile()">
        <!-- ✅ الاسم على الشمال -->
        <span class="display-name">{{ displayName }}</span>
        <!-- ✅ الصورة الشخصية -->
        <img [src]="profileImageUrl" class="profile-img" (error)="profileImageUrl='default user.png'">
        <!-- ✅ السهم -->
        <span class="arrow" [class.rotate]="showProfileMenu">▼</span>
      </div>

      <div class="profile-dropdown" *ngIf="showProfileMenu">
        <div class="dropdown-item"
             [routerLink]="['/profile', authService.getUsernameFromToken()]"
             (click)="showProfileMenu=false">
          <i class="bi bi-person-circle"></i> My Profile
        </div>
        <div class="dropdown-item" (click)="showProfileMenu=false">
          <i class="bi bi-gear"></i> Account Settings
        </div>
        <div class="dropdown-item" (click)="showProfileMenu=false">
          <i class="bi bi-phone"></i> Device Management
        </div>
        <div class="divider"></div>
        <div class="dropdown-item logout" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </div>
      </div>
    </div>

    <!-- زر القائمة للجوال -->
    <div class="hamburger" (click)="toggleMenu()">
      ☰
    </div>
  </div>
</nav>

<!-- القائمة الجانبية للجوال -->
<div class="mobile-menu" [class.open]="isMenuOpen">
  <a routerLink="/" (click)="isMenuOpen=false" >
    <i class="bi bi-house-fill"></i> Home
  </a>

  <a (click)="isMenuOpen=false"  routerLink="/courses">
    <i class="bi bi-layers-half" ></i> Explore Skills
  </a>
  <a (click)="isMenuOpen=false"  routerLink="/usercommunity" >
    <i class="bi bi-people-fill"></i> Community
  </a>
  <a (click)="isMenuOpen=false" routerLink="/about" >
    <i class="bi bi-info-circle"></i> About Us
  </a>

  <ng-container *ngIf="!isLoggedIn">
    <button class="mobile-btn" routerLink="/login" (click)="isMenuOpen=false">
      <i class="bi bi-person"></i> Log In
    </button>
    <button class="mobile-btn" routerLink="/register" (click)="isMenuOpen=false">
      <i class="bi bi-file-text-fill"></i> Register
    </button>
  </ng-container>
</div>
