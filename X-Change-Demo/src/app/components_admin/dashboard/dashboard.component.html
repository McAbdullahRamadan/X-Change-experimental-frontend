<div class="dashboard" [class.dark]="isDark">

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">

    <!-- Logo Card -->
    <div class="logo-card" (click)="navigateTo('home')">
      <div class="logo-icon">
        <img class="imglogo" src="Logodashbord.png" alt="Logo">
      </div>
      <h3 *ngIf="!isSidebarCollapsed">X-Change</h3>
    </div>

    <hr id="Hr" *ngIf="!isSidebarCollapsed">

    <!-- Menu -->
    <nav class="menu">
      <a (click)="navigateTo('home')" [class.active]="activePage === 'home'">
        <i class="bi bi-grid"></i>
        <span *ngIf="!isSidebarCollapsed">Dashboard</span>
      </a>

      <a (click)="navigateTo('user-management')" [class.active]="activePage === 'user-management'">
        <i class="bi bi-person-fill-gear"></i>
        <span *ngIf="!isSidebarCollapsed">User Management</span>
      </a>

      <a (click)="navigateTo('educator-verification')" [class.active]="activePage === 'educator-verification'">
        <i class="bi bi-person-check"></i>
        <span *ngIf="!isSidebarCollapsed">Educator Verification</span>
      </a>

      <a (click)="navigateTo('moderation')" [class.active]="activePage === 'moderation'">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span *ngIf="!isSidebarCollapsed">Moderation</span>
      </a>

      <a (click)="navigateTo('course-management')" [class.active]="activePage === 'course-management'">
        <i class="bi bi-file-play"></i>
        <span *ngIf="!isSidebarCollapsed">Course & Content Management</span>
      </a>

      <a (click)="navigateTo('labor-exchange')" [class.active]="activePage === 'labor-exchange'">
        <i class="bi bi-arrow-left-right"></i>
        <span *ngIf="!isSidebarCollapsed">Labor Exchange Oversight</span>
      </a>

      <a (click)="navigateTo('corporate-partners')" [class.active]="activePage === 'corporate-partners'">
        <i class="bi bi-building-gear"></i>
        <span *ngIf="!isSidebarCollapsed">Corporate Partner Management</span>
      </a>

      <a (click)="navigateTo('gamification')" [class.active]="activePage === 'gamification'">
        <i class="bi bi-controller"></i>
        <span *ngIf="!isSidebarCollapsed">Gamification Configuration</span>
      </a>

      <a (click)="navigateTo('audit-logs')" [class.active]="activePage === 'audit-logs'">
        <i class="bi bi-file-text-fill"></i>
        <span *ngIf="!isSidebarCollapsed">Audit Logs</span>
      </a>
    </nav>

  </aside>

  <!-- Main Content -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <i class="bi bi-justify-left menu-toggle-icon" (click)="toggleSidebar()"></i>
      <div class="left-section">
        <i class="bi bi-list menu-icon" (click)="toggleSidebarMobile()"></i>

        <div class="search-box">
          <input type="text" placeholder="Search for anything..." />
          <i class="bi bi-search search-icon"></i>
        </div>
      </div>

      <div class="right-section">


        <i class="bi"
          [class.bi-moon]="!isDark"
          [class.bi-sun]="isDark"
          (click)="toggleDarkMode()">
        </i>

        <i class="bi bi-bell"></i>
        <i class="bi bi-arrows-fullscreen" (click)="toggleFullscreen()"></i>

        <div class="profile">
          <img src="default user.png" alt="Profile" (click)="goToProfile()" />
        </div>
      </div>

    </header>

    <!-- ✅ Dynamic Content using Router Outlet -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>

<!-- Mobile Sidebar Overlay -->
<div class="sidebar-overlay" [class.show]="isMobileSidebarOpen" (click)="closeMobileSidebar()"></div>
