<!-- قسم What's coming in the future -->
<section class="future-showcase">
  <div class="future-header">
    <div class="glow-text">
      <span class="sparkle">✨</span>
      What's coming in the future
      <span class="sparkle">✨</span>
    </div>
    <div class="underline-effect"></div>
  </div>

  <div class="video-container">
    <div class="video-wrapper">
      <video #futureVideo autoplay muted loop playsinline class="future-video">
        <source src="X-change vid.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <!-- زر التحكم بالفيديو - Play/Pause -->
      <button class="video-control-btn" id="videoControlBtn">
        <span class="play-icon">▶</span>
        <span class="pause-icon" style="display: none;">⏸</span>
      </button>

      <!-- Overlay effect -->
      <div class="video-overlay"></div>

      <!-- Gradient border effect -->
      <div class="video-border"></div>
    </div>

    <!-- Video caption -->
    <div class="video-caption">
      <span class="caption-icon">🎬</span> Sneak peek into upcoming features
    </div>
  </div>
</section>

<!-- قسم الإحصائيات الأصلي -->
<section class="section stats">
  <div class="stat-box">
    <h2><span class="counter" data-target="50">0</span>K</h2>
    <p>Gen Z learners vibing rn</p>
  </div>

  <div class="stat-box">
    <h2><span class="counter" data-target="500">0</span>+</h2>
    <p>Skills to unlock</p>
  </div>
</section>
